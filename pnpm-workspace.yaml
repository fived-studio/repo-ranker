# Minimum release age for npm packages (supply-chain attack defense).
# Any version must have been published for at least 1 day before pnpm installs
# it. Most malicious npm releases are caught and pulled within hours, so this
# delay provides a strong safety buffer. Add trusted publishers to
# `minimumReleaseAgeExclude` if you need to install a fresher version.
minimumReleaseAge: 1440

packages:
  - apps/*
  - packages/*

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver

overrides:
  # drizzle-kit bundles an older esbuild that's vulnerable; pin it forward.
  '@esbuild-kit/esm-loader': 'npm:tsx@^4.21.0'
  esbuild: '0.27.3'
