<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff8a1a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8a1a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a1a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff8a1a"/>
      <stop offset="100%" stop-color="#ff8a1a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
  </g>

  <!-- Accent line -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="url(#line)" stroke-width="1"/>

  <!-- Eyebrow / tag -->
  <g transform="translate(80,150)">
    <rect width="220" height="34" rx="6" fill="#1a1a1a" stroke="#262626"/>
    <text x="16" y="22" font-family="'SF Mono', 'JetBrains Mono', 'Space Mono', monospace" font-size="13" fill="#ff8a1a" letter-spacing="2">GITHUB · TRAFFIC · 14D</text>
  </g>

  <!-- Title -->
  <text x="80" y="290" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="92" font-weight="700" fill="#fafafa" letter-spacing="-2">Repo Ranker</text>

  <!-- Subtitle -->
  <text x="80" y="350" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" fill="#a1a1a1">Rank your repos by views, clones, stars &amp; activity.</text>

  <!-- Mock chart bars -->
  <g transform="translate(80,420)" filter="url(#glow)">
    <rect x="0"   y="60"  width="38" height="80"  rx="3" fill="url(#bar)"/>
    <rect x="58"  y="40"  width="38" height="100" rx="3" fill="url(#bar)"/>
    <rect x="116" y="20"  width="38" height="120" rx="3" fill="url(#bar)"/>
    <rect x="174" y="0"   width="38" height="140" rx="3" fill="url(#bar)"/>
    <rect x="232" y="34"  width="38" height="106" rx="3" fill="url(#bar)"/>
    <rect x="290" y="50"  width="38" height="90"  rx="3" fill="url(#bar)"/>
    <rect x="348" y="22"  width="38" height="118" rx="3" fill="url(#bar)"/>
    <rect x="406" y="10"  width="38" height="130" rx="3" fill="url(#bar)"/>
    <rect x="464" y="44"  width="38" height="96"  rx="3" fill="url(#bar)"/>
    <rect x="522" y="64"  width="38" height="76"  rx="3" fill="url(#bar)"/>
  </g>

  <!-- Stats column -->
  <g transform="translate(760,420)" font-family="'SF Mono', 'JetBrains Mono', 'Space Mono', monospace" fill="#fafafa">
    <text x="0" y="0"  font-size="14" fill="#737373" letter-spacing="2">14D VIEWS</text>
    <text x="0" y="44" font-size="56" font-weight="700" fill="#ff8a1a">128,402</text>

    <text x="0" y="100" font-size="14" fill="#737373" letter-spacing="2">14D CLONES</text>
    <text x="0" y="144" font-size="56" font-weight="700" fill="#ff8a1a">4,217</text>
  </g>

  <!-- Bottom signature -->
  <text x="80" y="600" font-family="'SF Mono', 'JetBrains Mono', 'Space Mono', monospace" font-size="14" fill="#525252" letter-spacing="2">github.com · open source</text>
</svg>
